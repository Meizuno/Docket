# Alembic config. The database URL is NOT set here — env.py reads it from the
# application settings (DOCKET_DATABASE_URL), so there is one source of truth.
[alembic]
script_location = alembic
prepend_sys_path = .
# Revision filenames are prefixed with a zero-padded counter for ordering.
file_template = %%(rev)s_%%(slug)s
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
