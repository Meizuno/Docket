name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest
        run: pytest -W error

      - name: Ruff lint
        run: ruff check dispatcher tests

      - name: Ruff format check
        run: ruff format --check dispatcher tests

      - name: Mypy
        run: mypy dispatcher tests

      - name: Codespell
        run: codespell --skip="*.lock,.git,__pycache__,.venv,*.egg-info,.pytest_cache,.mypy_cache,.ruff_cache,.claude"

      - name: pip-audit
        run: pip-audit --skip-editable

      - name: License audit
        run: pip-licenses --fail-on="GPL;LGPL;AGPL"
